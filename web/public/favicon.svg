<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a1f3a"/>
      <stop offset="100%" stop-color="#360d1b"/>
    </linearGradient>
    <linearGradient id="berry" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d36d88"/>
      <stop offset="56%" stop-color="#8B2942"/>
      <stop offset="100%" stop-color="#5C1A2A"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b9d184"/>
      <stop offset="100%" stop-color="#3D8B4F"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Leaf -->
  <ellipse cx="18" cy="9" rx="5" ry="3" transform="rotate(-22 18 9)" fill="url(#leaf)"/>
  <!-- Three berries -->
  <circle cx="16" cy="14" r="5" fill="url(#berry)"/>
  <circle cx="11" cy="21" r="5" fill="url(#berry)"/>
  <circle cx="21" cy="21" r="5" fill="url(#berry)"/>
</svg>
