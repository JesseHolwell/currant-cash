<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a1226"/>
      <stop offset="100%" stop-color="#1a0610"/>
    </linearGradient>
    <linearGradient id="berry" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d36d88"/>
      <stop offset="56%" stop-color="#8B2942"/>
      <stop offset="100%" stop-color="#5C1A2A"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8e090"/>
      <stop offset="100%" stop-color="#3D8B4F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d36d88" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d36d88" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d36d88" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle horizontal accent band -->
  <rect x="0" y="250" width="1200" height="130" fill="url(#accent)"/>

  <!-- Decorative circles (soft ambient) -->
  <circle cx="900" cy="315" r="280" fill="#7a1f3a" opacity="0.12"/>
  <circle cx="150" cy="500" r="180" fill="#7a1f3a" opacity="0.08"/>

  <!-- Logo group — centered left column -->
  <g transform="translate(180, 230)">
    <!-- Berry cluster scaled up ~5x from 32px favicon -->
    <!-- Leaf -->
    <ellipse cx="90" cy="30" rx="32" ry="18" transform="rotate(-22 90 30)" fill="url(#leaf)" filter="url(#glow)"/>
    <!-- Three berries -->
    <circle cx="80" cy="68" r="30" fill="url(#berry)" filter="url(#softglow)"/>
    <circle cx="52" cy="112" r="30" fill="url(#berry)" filter="url(#softglow)"/>
    <circle cx="108" cy="112" r="30" fill="url(#berry)" filter="url(#softglow)"/>
  </g>

  <!-- Brand name -->
  <text
    x="340"
    y="320"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="96"
    font-weight="700"
    letter-spacing="-2"
    fill="#ffffff"
  >Currant</text>

  <!-- Tagline -->
  <text
    x="342"
    y="378"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="28"
    font-weight="400"
    letter-spacing="0.5"
    fill="#d36d88"
    opacity="0.9"
  >Personal finance, beautifully visualized</text>

  <!-- URL pill -->
  <rect x="342" y="415" width="210" height="38" rx="19" fill="#ffffff" opacity="0.08"/>
  <text
    x="447"
    y="439"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="18"
    font-weight="500"
    fill="#ffffff"
    opacity="0.6"
  >currant.cash</text>
</svg>
